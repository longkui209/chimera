# ============================================================
# Chimera Nginx 反向代理配置
# ============================================================

upstream chimera_api {
    server chimera:8004;
    keepalive 32;
}

server {
    listen 80;
    server_name chimera.local;

    # 日志
    access_log /var/log/nginx/chimera_access.log;
    error_log  /var/log/nginx/chimera_error.log;

    # 最大上传大小（用于资产文件）
    client_max_body_size 10G;

    # API 代理
    location / {
        proxy_pass http://chimera_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # API 文档
    location /docs {
        proxy_pass http://chimera_api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 健康检查
    location /health {
        proxy_pass http://chimera_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Dashboard 静态资源
    location /dashboard {
        alias /app/chimera/dashboard;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
